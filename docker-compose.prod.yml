name: zeta-prod

services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg16
    container_name: zeta-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      TZ: Asia/Shanghai
    volumes:
      - zeta-postgres-data:/var/lib/postgresql/data
      - ./docker-infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7.4-alpine
    container_name: zeta-prod-redis
    restart: unless-stopped
    volumes:
      - zeta-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  ocr:
    image: zeta-ocr:prod
    container_name: zeta-prod-ocr
    restart: unless-stopped
    build:
      context: ./services/ocr
      dockerfile: Dockerfile
    environment:
      OCR_LANG: ${OCR_LANG:-ch}
      OCR_VERSION: ${OCR_VERSION:-PP-OCRv4}
      OCR_DETECTION_MODEL: ${OCR_DETECTION_MODEL:-PP-OCRv4_mobile_det}
      OCR_RECOGNITION_MODEL: ${OCR_RECOGNITION_MODEL:-PP-OCRv4_mobile_rec}
      OCR_MAX_PAGES: ${OCR_MAX_PAGES:-50}
    expose:
      - "8001"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    image: zeta-api:prod
    container_name: zeta-prod-api
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
      target: api
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-node:24-bookworm-slim}
    environment:
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:?AUTH_TOKEN_SECRET is required}
      ACCESS_TOKEN_TTL_SECONDS: ${ACCESS_TOKEN_TTL_SECONDS:-900}
      REFRESH_TOKEN_TTL_SECONDS: ${REFRESH_TOKEN_TTL_SECONDS:-604800}
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME:?SEED_ADMIN_USERNAME is required}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:?SEED_ADMIN_PASSWORD is required}
      SEED_ADMIN_DISPLAY_NAME: ${SEED_ADMIN_DISPLAY_NAME:-Zeta Admin}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OCR_SERVICE_URL: http://ocr:8001
      OCR_REQUEST_TIMEOUT_MS: ${OCR_REQUEST_TIMEOUT_MS:-600000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ocr:
        condition: service_healthy
    expose:
      - "3000"

  web:
    image: zeta-web:prod
    container_name: zeta-prod-web
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
      target: web
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-node:24-bookworm-slim}
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  zeta-postgres-data:
  zeta-redis-data:
