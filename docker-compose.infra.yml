name: zeta-infra

services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg16
    container_name: zeta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zeta}
      POSTGRES_USER: ${POSTGRES_USER:-zeta}
      POSTGRES_HOST_AUTH_METHOD: trust
      TZ: Asia/Shanghai
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - zeta-postgres-data:/var/lib/postgresql/data
      - ./docker-infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7.4-alpine
    container_name: zeta-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - zeta-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  ocr:
    profiles: ["ocr"]
    build:
      context: ./services/ocr
      dockerfile: Dockerfile
    container_name: zeta-ocr
    restart: unless-stopped
    environment:
      OCR_LANG: ${OCR_LANG:-ch}
      OCR_VERSION: ${OCR_VERSION:-PP-OCRv4}
      OCR_DETECTION_MODEL: ${OCR_DETECTION_MODEL:-PP-OCRv4_mobile_det}
      OCR_RECOGNITION_MODEL: ${OCR_RECOGNITION_MODEL:-PP-OCRv4_mobile_rec}
      OCR_MAX_PAGES: ${OCR_MAX_PAGES:-50}
    ports:
      - "${OCR_PORT:-8001}:8001"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  zeta-postgres-data:
  zeta-redis-data:
