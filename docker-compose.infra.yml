name: zeta-infra

services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg16
    container_name: zeta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zeta}
      POSTGRES_USER: ${POSTGRES_USER:-zeta}
      POSTGRES_HOST_AUTH_METHOD: trust
      TZ: Asia/Shanghai
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - zeta-postgres-data:/var/lib/postgresql/data
      - ./docker-infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  zeta-postgres-data:
